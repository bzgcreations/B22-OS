name: Build B22-OS APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download and setup Gradle 8.2
      run: |
        mkdir -p /tmp/gradle
        cd /tmp/gradle
        wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip
        echo "/tmp/gradle/gradle-8.2/bin" >> $GITHUB_PATH

    - name: Verify Gradle
      run: gradle --version

    - name: Build debug APK
      run: |
        cd android
        gradle clean assembleDebug --stacktrace

    - name: Build release APK
      run: |
        cd android
        gradle assembleRelease --stacktrace

    - name: Find APK files
      if: always()
      run: find android -name "*.apk" -type f

    - name: Upload debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: B22-OS-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload release APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: B22-OS-release-apk
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30

    - name: Create Release
      if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android/app/build/outputs/apk/debug/app-debug.apk
          android/app/build/outputs/apk/release/app-release.apk
        tag_name: build-${{ github.run_number }}
        name: B22-OS Build #${{ github.run_number }}
        body: "APK Build #${{ github.run_number }} - Ready to install!"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
