name: Build B22-OS APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 8.2

    - name: Make gradlew executable
      run: chmod +x android/gradlew

    - name: Build debug APK
      run: |
        cd android
        ./gradlew clean assembleDebug --stacktrace

    - name: Build release APK
      run: |
        cd android
        ./gradlew assembleRelease --stacktrace

    - name: List APK outputs
      if: always()
      run: |
        echo "=== Debug APK ==="
        ls -lh android/app/build/outputs/apk/debug/*.apk || echo "Not found"
        echo ""
        echo "=== Release APK ==="
        ls -lh android/app/build/outputs/apk/release/*.apk || echo "Not found"

    - name: Upload debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: B22-OS-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload release APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: B22-OS-release-apk
        path: android/app/build/outputs/apk/release/app-release.apk

    - name: Create GitHub Release
      if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android/app/build/outputs/apk/debug/app-debug.apk
          android/app/build/outputs/apk/release/app-release.apk
        tag_name: build-${{ github.run_number }}
        name: B22-OS Build #${{ github.run_number }}
        body: |
          # B22-OS Build #${{ github.run_number }}
          
          Download and install on your Android 15+ device!
          
          - **app-debug.apk** - Debug version
          - **app-release.apk** - Release version (recommended)
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
