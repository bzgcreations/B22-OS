name: Build B22-OS APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 8.2

    - name: Build debug APK
      run: |
        cd android
        gradle assembleDebug -v

    - name: Build release APK
      run: |
        cd android
        gradle assembleRelease -v

    - name: Check APK outputs
      run: |
        find android -name "*.apk" -type f
        ls -lh android/app/build/outputs/apk/debug/*.apk || echo "Debug APK not found"
        ls -lh android/app/build/outputs/apk/release/*.apk || echo "Release APK not found"

    - name: Upload debug APK to artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: B22-OS-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload release APK to artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: B22-OS-release
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30

    - name: Create GitHub Release
      if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android/app/build/outputs/apk/debug/app-debug.apk
          android/app/build/outputs/apk/release/app-release.apk
        tag_name: build-${{ github.run_number }}
        release_name: B22-OS Build #${{ github.run_number }}
        body: |
          # B22-OS - Automated Build
          
          **Build Number:** #${{ github.run_number }}
          **Commit:** ${{ github.sha }}
          
          Download the APK and install on your Android 15+ device!
          
          - **app-debug.apk** - Debug version
          - **app-release.apk** - Release version (recommended)
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
