name: Build B22-OS APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Make Gradle executable
      run: chmod +x android/gradlew

    - name: Build debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Build release APK
      run: |
        cd android
        ./gradlew assembleRelease

    - name: Upload debug APK to artifacts
      uses: actions/upload-artifact@v3
      with:
        name: B22-OS-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload release APK to artifacts
      uses: actions/upload-artifact@v3
      with:
        name: B22-OS-release
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android/app/build/outputs/apk/debug/app-debug.apk
          android/app/build/outputs/apk/release/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload to Release (every push to main)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: ncipollo/release-action@v1
      with:
        artifacts: |
          android/app/build/outputs/apk/debug/app-debug.apk
          android/app/build/outputs/apk/release/app-release.apk
        tag: latest
        allowUpdates: true
        replacesArtifacts: true
        body: |
          # B22-OS - Latest Build
          
          Latest APK builds from the main branch.
          
          ## Installation
          1. Download the APK file from below
          2. Transfer to your Android 15+ phone
          3. Open Files app and tap the APK
          4. Tap Install
          5. Enjoy B22-OS!
          
          ## Files
          - **app-debug.apk** - Debug version (for testing)
          - **app-release.apk** - Release version (optimized)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
